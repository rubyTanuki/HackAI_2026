<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syllabus Timeline • Login</title>
  <link rel="stylesheet" href="../Assets/styles.css" />
  <style>
    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        background-color: #f8f9fc; margin: 0; display: flex; justify-content: center; align-items: center; 
        height: 100vh; flex-direction: column; color: #1a1a2e;
    }
    .auth-container { 
        background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        text-align: center; max-width: 400px; width: 100%;
    }
    .auth-container h1 { font-size: 1.8rem; margin-bottom: 10px; color: #4361ee; }
    .auth-container p { color: #718096; margin-bottom: 30px; }
    #sign-in { display: flex; justify-content: center; min-height: 400px; align-items: center;}
  </style>
</head>
<body>
  <div class="auth-container">
    <h1>Syllabus Timeline</h1>
    <p>Please sign in to upload your files and generate your timeline.</p>
    <div id="sign-in">Loading Authentication...</div>
  </div>

  <!-- Initialize Clerk securely using default static script tags -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_bmV3LWFzcC0zMi5jbGVyay5hY2NvdW50cy5kZXYk"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>

  <script>
    window.addEventListener('load', async function () {
      try {
        await window.Clerk.load();

        if (window.Clerk.user) {
          // If already logged in, redirect straight to upload
          window.location.replace('./upload.html');
        } else {
          // Display the sign-in modal securely inside the div
          const signInDiv = document.getElementById('sign-in');
          signInDiv.innerHTML = '';
          window.Clerk.mountSignIn(signInDiv, {
             afterSignInUrl: './upload.html',
             afterSignUpUrl: './upload.html'
          });
        }
      } catch (err) {
        console.error('Error starting Clerk: ', err);
        document.getElementById('sign-in').innerText = 'Failed to load Clerk authentication. Please check your console.';
      }
    });
  </script>
</body>
</html>
